version: "3.9"

services:
  catalog-service:
    build: .
    ports:
      - "8003:8003"
    environment:
      - DATABASE_URL=postgresql://shopstack:shopstack@db:5432/catalog
      - PORT=8003
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: shopstack
      POSTGRES_PASSWORD: shopstack
      POSTGRES_DB: catalog
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopstack -d catalog"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
